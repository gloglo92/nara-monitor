name: 나라장터 기술용역 수집 (사전규격 + 발주계획)

on:
  schedule:
    # KST 07:00~08:00 (UTC 22~23시) - 혼잡 적은 :15,:45 분에 시간당 2회
    - cron: "15,45 22,23 * * *"
    # KST 09:00~20:00 (UTC 00~11시) - 시간당 2회
    - cron: "15,45 0-11 * * *"

  # 수동 실행 버튼 (테스트용)
  workflow_dispatch:
    inputs:
      target_date:
        description: "특정 날짜 수집 (빈칸 = 전일 자동). 형식: YYYYMMDD"
        required: false
        default: ""
      force_notify:
        description: "요약 강제 발송 (테스트용, true/false)"
        required: false
        default: "false"

# ★ repo 쓰기 권한 (git push 용)
permissions:
  contents: write

# ★ 동시 실행 방지 (빈번한 cron이 겹치지 않도록 직렬화)
concurrency:
  group: nara-fetch
  cancel-in-progress: false

jobs:
  fetch-and-notify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. 코드 체크아웃 ────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python 환경 설정 ─────────────────────────────────
      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. 의존성 설치 ──────────────────────────────────────
      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests pandas openpyxl

      # ── 4. 사전규격 수집 + JSON 저장 (무음) ────────────────
      - name: 📋 Run 사전규격 fetch
        env:
          NARA_API_KEY:        ${{ secrets.NARA_API_KEY }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          TARGET_DATE:         ${{ github.event.inputs.target_date }}
        run: |
          cd scripts
          python fetch_narajangteo.py

      # ── 5. 발주계획 수집 + JSON 저장 (무음) ────────────────
      - name: 📌 Run 발주계획 fetch
        env:
          NARA_API_KEY:        ${{ secrets.NARA_API_KEY }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          TARGET_DATE:         ${{ github.event.inputs.target_date }}
        run: |
          cd scripts
          python fetch_orderplan.py

      # ── 6. ★ 하루 1회 요약 알림 (마커로 중복 발송 방지) ────
      - name: 🔔 Send daily summary
        env:
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          TARGET_DATE:         ${{ github.event.inputs.target_date }}
          FORCE_NOTIFY:        ${{ github.event.inputs.force_notify }}
        run: |
          cd scripts
          python notify_summary.py

      # ── 7. data/ 변경사항 git commit & push ────────────────
      - name: 💾 Commit and push data
        run: |
          git config user.name  "GitHub Actions"
          git config user.email "actions@github.com"
          git add docs/data/
          # 변경사항이 있을 때만 커밋 (없으면 스킵)
          git diff --staged --quiet || git commit -m "📊 데이터 업데이트: $(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M KST')"
          for i in 1 2 3; do
            git pull --rebase --autostash && git push && break
            echo "Push 실패 ($i/3), 재시도..."
            sleep 10
          done

      # ── 8. 실패 시 텔레그램 에러 알림 ──────────────────────
      - name: 🔴 Notify on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="❌ 나라장터 수집 실패! GitHub Actions 로그를 확인해주세요." \
            -d parse_mode="Markdown"
