name: 나라장터 기술용역 수집 (사전규격 + 발주계획)

on:
  schedule:
     # 1. 매일 아침 6시 (KST 06:00 = UTC 21:00)
    - cron: "0 21 * * *"
    
    # 2. 오전 9시부터 저녁 8시까지 매시각 (KST 09:00~20:00 = UTC 00:00~11:00)
    - cron: "0 0-11 * * *"

  # 수동 실행 버튼 (테스트용)
  workflow_dispatch:
    inputs:
      target_date:
        description: "특정 날짜 수집 (빈칸 = 전일 자동). 형식: YYYYMMDD"
        required: false
        default: ""

# ★ repo 쓰기 권한 (git push 용)
permissions:
  contents: write

jobs:
  fetch-and-notify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. 코드 체크아웃 ────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python 환경 설정 ─────────────────────────────────
      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. 의존성 설치 ──────────────────────────────────────
      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests pandas openpyxl

      # ── 4. 날짜 모드 결정 (6시 정기수집=전날, 수시수집=당일) ──
      - name: 🗓️ Set date mode
        run: |
          if [ "${{ github.event.schedule }}" = "0 21 * * *" ]; then
            echo "USE_YESTERDAY=true" >> $GITHUB_ENV
          else
            echo "USE_YESTERDAY=false" >> $GITHUB_ENV
          fi

      # ── 5. 사전규격 수집 + JSON 저장 ────────────────────────
      - name: 📋 Run 사전규격 fetch
        env:
          NARA_API_KEY:        ${{ secrets.NARA_API_KEY }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          TARGET_DATE:         ${{ github.event.inputs.target_date }}
        run: |
          cd scripts
          python fetch_narajangteo.py

      # ── 6. 발주계획 수집 + JSON 저장 ────────────────────────
      - name: 📌 Run 발주계획 fetch
        env:
          NARA_API_KEY:        ${{ secrets.NARA_API_KEY }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          TARGET_DATE:         ${{ github.event.inputs.target_date }}
        run: |
          cd scripts
          python fetch_orderplan.py

      # ── 6. ★ 신규: data/ 변경사항 git commit & push ────────
      - name: 💾 Commit and push data
        run: |
          git config user.name  "GitHub Actions"
          git config user.email "actions@github.com"
          git add docs/data/
          # 변경사항이 있을 때만 커밋 (없으면 스킵)
          git diff --staged --quiet || git commit -m "📊 데이터 업데이트: $(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M KST')"
          git push

      # ── 7. 실패 시 텔레그램 에러 알림 ──────────────────────
      - name: 🔴 Notify on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="❌ 나라장터 수집 실패! GitHub Actions 로그를 확인해주세요." \
            -d parse_mode="Markdown"
